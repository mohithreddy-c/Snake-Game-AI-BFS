<!DOCTYPE html>
<html>

<head>
    <title>Snake AI using BFS</title>
    <link rel="stylesheet" href="style.css">
</head>

<p>
A = AI Mode |
M = Manual Mode |
R = Reset High Score
</p>

<div id="controls">

    <button onclick="setAIMode()">🤖 AI</button>

    <button onclick="setManualMode()">🎮 Manual</button>

    <button onclick="resetGame()">🔄 Restart</button>

</div>

<div id="mobileControls">

    <button onclick="direction='UP'">⬆️</button>

    <div>
        <button onclick="direction='LEFT'">⬅️</button>

        <button onclick="direction='DOWN'">⬇️</button>

        <button onclick="direction='RIGHT'">➡️</button>
    </div>

</div>

<body>

    <h1>Snake Game</h1>
    <h2 id="score">Score: 0</h2>
    <h2 id="highScore">High Score: 0</h2>
    <h2 id="mode">Mode: AI</h2>
    <h3 id="status">
🤖 AI Searching...
</h3>

    <div id="board"></div>

    <script src="bfs.js"></script>
    <script src="script.js"></script>

</body>

</html>
